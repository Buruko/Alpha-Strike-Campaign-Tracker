name            = "alpha-strike-api"
main            = "src/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding      = "DB"
database_name = "campaign-db"
database_id  = "REPLACE_WITH_YOUR_DB_ID"   # filled in after: wrangler d1 create campaign-db
migrations_dir = "migrations"

[vars]
CLIENT_URL = "https://alpha-strike-tracker.pages.dev"   # update after Pages deploy

# JWT_SECRET must be set as a secret (never in plaintext here):
#   wrangler secret put JWT_SECRET
