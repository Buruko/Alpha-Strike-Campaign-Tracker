services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: alpha-strike-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true          # Render generates a secure random value
      - key: CLIENT_URL
        value: https://alpha-strike-tracker.onrender.com   # update to your frontend URL
      - key: DB_PATH
        value: /opt/render/project/data/campaign.db
    disk:
      name: campaign-data
      mountPath: /opt/render/project/data
      sizeGB: 1

  # ── Frontend static site ───────────────────────────────────────────────────
  - type: web
    name: alpha-strike-tracker
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://alpha-strike-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
